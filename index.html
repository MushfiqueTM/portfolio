<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="google-site-verification" content="KDDmgbUolVqQC4Sm4zBX0wu4_EbcbQtAz_gQRFAK7WU" />

    <!-- Start fetching the hero portrait in parallel with the JS bundle so it is ready when Hero renders -->
    <link rel="preload" as="image" href="/projects/my_picture_2.webp" fetchpriority="high" />

    <!-- Inline splash so mobile users see something immediately while the JS bundle loads.
         createRoot replaces #root's contents on first render, so this disappears as soon as React mounts. -->
    <style>
      html, body { margin: 0; padding: 0; background: #F2F4F6; }
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #F2F4F6;
        color: #1A2B4A;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      #initial-loader .ring {
        width: 32px;
        height: 32px;
        border: 2px solid rgba(26, 43, 74, 0.15);
        border-top-color: #1A2B4A;
        border-radius: 50%;
        animation: il-spin 0.9s linear infinite;
      }
      #initial-loader .name {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      #initial-loader .sub {
        font-size: 12px;
        color: #5F6B7A;
      }
      @keyframes il-spin { to { transform: rotate(360deg); } }
    </style>

    <!-- SEO -->
    <title>Mushfique Tanzim Muztaba — Mechanical Engineer</title>
    <meta name="description" content="Portfolio of Mushfique Tanzim Muztaba — Mechanical Engineering student at PolyU with experience in CAD/FEA, ROS2 robotics, AI/computer vision, and enterprise software. Open to graduate opportunities." />
    <meta name="keywords" content="Mushfique Tanzim Muztaba, mechanical engineer, robotics, ROS2, SOLIDWORKS, portfolio, PolyU, Hong Kong" />
    <meta name="author" content="Mushfique Tanzim Muztaba" />
    <link rel="canonical" href="https://mushfique-portfolio.vercel.app/" />

    <!-- Open Graph (LinkedIn, WhatsApp, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mushfique Tanzim Muztaba — Mechanical Engineer" />
    <meta property="og:description" content="Mechanical Engineering student at PolyU. Experience in CAD/FEA, ROS2 robotics, AI/computer vision, and enterprise software development." />
    <meta property="og:url" content="https://mushfique-portfolio.vercel.app/" />
    <meta property="og:image" content="https://mushfique-portfolio.vercel.app/projects/my_picture_2.jpg" />
    <meta property="og:site_name" content="Mushfique Tanzim Muztaba | Portfolio" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mushfique Tanzim Muztaba — Mechanical Engineer" />
    <meta name="twitter:description" content="Mechanical Engineering student at PolyU. Experience in CAD/FEA, ROS2 robotics, AI/computer vision, and enterprise software development." />
    <meta name="twitter:image" content="https://mushfique-portfolio.vercel.app/projects/my_picture_2.jpg" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Mushfique Tanzim Muztaba",
      "url": "https://mushfique-portfolio.vercel.app",
      "jobTitle": "Mechanical Engineering Student",
      "affiliation": {
        "@type": "Organization",
        "name": "The Hong Kong Polytechnic University"
      },
      "sameAs": [
        "https://www.linkedin.com/in/mushfique-tanzim-muztaba-331228242/"
      ],
      "knowsAbout": ["Mechanical Engineering", "CAD", "SOLIDWORKS", "ROS2", "Robotics", "Computer Vision", "Python", "Power Apps"]
    }
    </script>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="ring"></div>
        <div class="name">Mushfique Tanzim Muztaba</div>
        <div class="sub">Loading portfolio…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
